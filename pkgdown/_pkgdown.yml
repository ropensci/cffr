url: https://docs.ropensci.org/cffr

template:
  bootstrap: 5
  light-switch: true
  opengraph:
    twitter:
      creator: '@dhernangomez'
      card: summary_large_image

repo:
  branch: main

home:
  title: cffr | Generate Citation File Format (CFF) metadata for R packages
  description: >
    Generate, read, write and validate Citation File Format metadata for R
    packages.

reference:
- title: Create and maintain `CITATION.cff` files
  desc: Main workflow for R package authors.
- contents:
  - cff_write
  - cff_create
  - cff
  - cff_validate
  - cff_modify

- title: Read and write citation metadata
- subtitle: Read metadata
  desc: Read CFF, BibTeX and R package metadata.
- contents:
  - has_concept("reading")
- subtitle: Write metadata
  desc: Write CFF objects as citation files or BibTeX.
- contents:
  - has_concept("writing")
  - -cff_write

- title: Convert between CFF, R and BibTeX
  desc: Convert citation metadata to standard R objects and back.
- subtitle: Conversion helpers
- contents:
  - has_concept("conversions")
  - -cff_class
  - -as_bibentry
- subtitle: BibTeX helpers
- contents:
  - has_concept("bibtex")
  - -cff_read

- title: Inspect CFF schema values
  desc: List valid keys, licenses, versions and source types.
- contents:
  - has_concept("schemas")

- title: Automation
  desc: Helpers for keeping `CITATION.cff` synchronized with package metadata.
- contents:
  - has_concept("git")

- title: Data
  desc: Datasets used internally to map citation metadata.
- contents:
  - has_keyword("datasets")

- title: Package internals
- subtitle: Class system
  desc: Structure and behavior of CFF objects.
- contents:
  - cff_class
- subtitle: Package overview
  desc: Package-level documentation and references.
- contents:
  - cffr-package

- title: Deprecated functions
  desc: Superseded interfaces retained for compatibility.
- contents:
  - has_concept("deprecated", internal = TRUE)

navbar:
  structure:
    left:
    - intro
    - reference
    - articles
    - tutorials
    - news
    right:
    - search
    - github
    - lightswitch

authors:
  Diego Hernangómez:
    href: https://dieghernan.github.io/
  João Martins:
    href: https://github.com/zambujo/
  Scott Chamberlain:
    href: https://scottchamberlain.info/

articles:
- title: Guides
  desc: Get started creating and maintaining CFF metadata.
  contents:
  - cffr
- title: Crosswalks
  navbar: Crosswalks
  desc: Technical mappings between R, CFF and BibTeX metadata.
  contents:
  - r-cff
  - bibtex-cff
- title: Publications
  navbar: Publications
  desc: Research publications describing **cffr**.
  contents:
  - joss-paper
- title: Around cffr
  navbar: Media
  desc: Blog posts, podcasts and external material about **cffr**.
  contents:
  - ropensci-cffr
  - ropensci-testing-cffr
  - rweekly-podcast

external-articles:
- name: ropensci-cffr
  title: "cffr: Create a CITATION.cff file for your R package"
  description: rOpenSci blog post introducing cffr.
  href: https://ropensci.org/blog/2021/11/23/cffr/
- name: ropensci-testing-cffr
  title: How I test cffr on (about) 2,000 packages
  description: rOpenSci blog post about cffr reverse dependency testing.
  href: https://ropensci.org/blog/2021/11/23/how-i-test-cffr/
- name: rweekly-podcast
  title: "R Weekly Highlights: Issue 2021-W48 Highlights"
  description: Podcast episode covering cffr.
  href: https://share.fireside.fm/episode/87RSVeFz+4R-j8_xW
